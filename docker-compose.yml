  ledger-service:
    build:
      context: .
      dockerfile: services/ledger_service/Dockerfile
    container_name: swimbuddz_ledger
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    ports:
      - "8018:8018"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

  # ==================================================================
  # API GATEWAY
  # ==================================================================
  gateway:
    build:
      context: .
      dockerfile: services/gateway_service/Dockerfile
    container_name: swimbuddz_gateway
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      members-service:
        condition: service_started
      sessions-service:
        condition: service_started
      attendance-service:
        condition: service_started
      communications-service:
        condition: service_started
      payments-service:
        condition: service_started
      academy-service:
        condition: service_started
      media-service:
        condition: service_started
      events-service:
        condition: service_started
      transport-service:
        condition: service_started
      store-service:
        condition: service_started
      ai-service:
        condition: service_started
      volunteer-service:
        condition: service_started
      wallet-service:
        condition: service_started
      pools-service:
        condition: service_started
      reporting-service:
        condition: service_started
      chat-service:
        condition: service_started
      corporate-service:
        condition: service_started
      ledger-service:
        condition: service_started
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      uvicorn services.gateway_service.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - .:/app

  # ==================================================================
  # BACKGROUND WORKERS
  # ==================================================================
  attendance-worker:
    build:
      context: .
      dockerfile: services/attendance_service/Dockerfile
    container_name: swimbuddz_attendance_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      attendance-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.attendance_service.worker.WorkerSettings
    volumes:
      - .:/app

  academy-worker:
    build:
      context: .
      dockerfile: services/academy_service/Dockerfile
    container_name: swimbuddz_academy_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      academy-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.academy_service.tasks.worker.WorkerSettings
    volumes:
      - .:/app

  members-worker:
    build:
      context: .
      dockerfile: services/members_service/Dockerfile
    container_name: swimbuddz_members_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      members-service:
        condition: service_started
      chat-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.members_service.tasks.worker.WorkerSettings
    volumes:
      - .:/app

  events-worker:
    build:
      context: .
      dockerfile: services/events_service/Dockerfile
    container_name: swimbuddz_events_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      events-service:
        condition: service_started
      chat-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.events_service.tasks.worker.WorkerSettings
    volumes:
      - .:/app

  sessions-worker:
    build:
      context: .
      dockerfile: services/sessions_service/Dockerfile
    container_name: swimbuddz_sessions_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      sessions-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.sessions_service.worker.WorkerSettings
    volumes:
      - .:/app

  transport-worker:
    build:
      context: .
      dockerfile: services/transport_service/Dockerfile
    container_name: swimbuddz_transport_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      transport-service:
        condition: service_started
      chat-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.transport_service.tasks.worker.WorkerSettings
    volumes:
      - .:/app

  communications-worker:
    build:
      context: .
      dockerfile: services/communications_service/Dockerfile
    container_name: swimbuddz_communications_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      communications-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.communications_service.worker.WorkerSettings
    volumes:
      - .:/app

  volunteer-worker:
    build:
      context: .
      dockerfile: services/volunteer_service/Dockerfile
    container_name: swimbuddz_volunteer_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      volunteer-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.volunteer_service.worker.WorkerSettings
    volumes:
      - .:/app

  payments-worker:
    build:
      context: .
      dockerfile: services/payments_service/Dockerfile
    container_name: swimbuddz_payments_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      payments-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.payments_service.worker.WorkerSettings
    volumes:
      - .:/app

  media-worker:
    build:
      context: .
      dockerfile: services/media_service/Dockerfile
    container_name: swimbuddz_media_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      media-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.media_service.tasks.worker.WorkerSettings
    volumes:
      - .:/app

  reporting-worker:
    build:
      context: .
      dockerfile: services/reporting_service/Dockerfile
    container_name: swimbuddz_reporting_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      reporting-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.reporting_service.tasks.worker.WorkerSettings
    volumes:
      - .:/app

  ai-worker:
    # ARQ worker for Stroke Lab swim-video analysis.
    # Shares the ai-service image (same Dockerfile installs the
    # `strokelab` extra: ultralytics / mediapipe / opencv-python-headless
    # / ffmpeg-python).
    build:
      context: .
      dockerfile: services/ai_service/Dockerfile
    container_name: swimbuddz_ai_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
      # Persist downloaded MediaPipe + YOLO weights between restarts.
      - STROKELAB_MODEL_DIR=/tmp/strokelab-models
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.ai_service.tasks.worker.WorkerSettings
    volumes:
      - .:/app
      - strokelab_models:/tmp/strokelab-models

  ai-worker-public:
    # Isolated ARQ worker for the PUBLIC (guest) analyzer queue (arq:ai-public).
    # Same image as ai-worker; a SEPARATE container so a public traffic spike
    # (Reddit) can't starve member analyses on arq:ai. CPU/mem caps live in
    # docker-compose.prod.yml (dev runs uncapped like ai-worker).
    build:
      context: .
      dockerfile: services/ai_service/Dockerfile
    container_name: swimbuddz_ai_worker_public
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
      - STROKELAB_MODEL_DIR=/tmp/strokelab-models
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.ai_service.tasks.worker.PublicWorkerSettings
    volumes:
      - .:/app
      - strokelab_models:/tmp/strokelab-models

  corporate-worker:
    build:
      context: .
      dockerfile: services/corporate_service/Dockerfile
    container_name: swimbuddz_corporate_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      corporate-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.corporate_service.worker.WorkerSettings
    volumes:
      - .:/app

  ledger-worker:
    build:
      context: .
      dockerfile: services/ledger_service/Dockerfile
    container_name: swimbuddz_ledger_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      ledger-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.ledger_service.worker.WorkerSettings
    volumes:
      - .:/app

  # ==================================================================
  # INFRASTRUCTURE
  # ==================================================================
  redis:
    image: redis:7-alpine
    container_name: swimbuddz_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  swimbuddz_db_data:
  redis_data:
  # Cached MediaPipe pose-landmarker + YOLOv8n weights for the ai-worker.
  # Persisting these across restarts saves the ~10s download on every boot
  # and avoids re-downloading on every CI run.
  strokelab_models:
