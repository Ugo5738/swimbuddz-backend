    container_name: swimbuddz_pools_worker
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      pools-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq services.pools_service.worker.WorkerSettings
    volumes:
      - .:/app

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting_service/Dockerfile
    container_name: swimbuddz_reporting
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    ports:
      - "8015:8015"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

  chat-service:
    build:
      context: .
      dockerfile: services/chat_service/Dockerfile
    container_name: swimbuddz_chat
    env_file:
      - .env.dev
    environment:
      - PYTHONPATH=/app
    ports:
      - "8016:8016"
    extra_hosts:
