# SwimBuddz — sports_club chart-of-accounts template
#
# Seeded on organization creation (consumed by scripts/seed/ledger_org.py in
# PR-1). Mirrors LEDGER_SERVICE_DESIGN.md §5.
#
# Field reference:
#   code           org-local account code (UNIQUE per org). Codes belong to the
#                  org and may differ per customer.
#   name           human-readable account name.
#   type           asset | liability | equity | revenue | expense | contra_asset
#   normal_balance debit | credit (the side that increases the account).
#   parent         code of the rollup parent (for the account hierarchy).
#   postable       true = a detail/leaf account you can post journal lines to;
#                  false = a rollup header (no direct postings).
#   maps_to        STABLE cross-org reference. Emitters reference accounts by
#                  this value, never by code (design doc §6/§8). NEVER rename a
#                  maps_to value — doing so breaks every emitter.
#   is_system      true = seeded & protected (cannot be renamed/deleted by org
#                  admins). All template accounts are system accounts.
#
# Cross-checked against design doc §8 integration mappings. Two refs used in §8
# but missing a maps_to in the §5 listing were added here and flagged back to
# the design doc: `accounts_payable` (2110; §8.3 inventory, §8.5 driver pay) and
# `expense_marketing` (6300; §8.2 welcome bonus + promo grants).

version: 1
vertical: sports_club

